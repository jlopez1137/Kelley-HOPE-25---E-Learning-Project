embedding_model:
  name: nomic-embed-text

chroma_db:
  persist_directory: ./chroma_db
  collection_name: tcp_redbook

llm:
  ollama_model: llama3.1:8b
  keep_alive: 30m     # keep the model in GPU memory between requests (shared DGX: don't pin forever)
  num_predict: 512    # cap answer length — course Q&A answers should be concise
  num_ctx: 4096       # fits retrieve_k x chunk_size context + prompt + answer with headroom
  temperature: 0    # deterministic: a section intro verified once stays identical at demo time

pdf_processor:
  chunk_size: 800
  chunk_overlap: 150

retrieval_qa:
  chain_type: stuff
  retrieve_k: 5

tts:
  provider: piper
  piper:
    model: en_US-lessac-medium
    model_dir: RAG/tts_models
    output_dir: RAG/tts_output
    sample_rate: 22050
  coqui:
    model: tts_models/en/ljspeech/fast_pitch
    sample_rate: 22050

stt:
  model: base.en
  device: cpu
  compute_type: int8